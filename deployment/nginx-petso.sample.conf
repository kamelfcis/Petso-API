# Sample nginx for Petso on a VPS (adjust server_name, upstream port, and project path).
#
# If multipart uploads return 201 but image_url is null: nginx often dropped the body
# (default client_max_body_size 1m is OK for small PNGs, but buffering/proxies vary).
# Reload nginx after edits: sudo nginx -t && sudo systemctl reload nginx
#
# If Django serves /media/ (SERVE_MEDIA_FROM_DJANGO=True in .env): one proxy location is enough.
# If nginx serves files from disk: set SERVE_MEDIA_FROM_DJANGO=False and uncomment /media/ below.

upstream petso_app {
    server 127.0.0.1:8000;
    keepalive 2;
}

server {
    listen 80;
    server_name 95.216.63.81;

    client_max_body_size 32m;
    client_body_buffer_size 128k;

    # Uncomment ONLY if SERVE_MEDIA_FROM_DJANGO=False and MEDIA_ROOT matches this path:
    # location /media/ {
    #     alias /var/www/Petso/media/;
    #     expires 7d;
    # }

    location / {
        proxy_pass http://petso_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_request_buffering off;
        proxy_read_timeout 120s;
    }
}
